services:
  - type: web
    name: patience-ai
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: PM2_HOME=/tmp/.pm2 ./node_modules/.bin/pm2-runtime start ecosystem.config.cjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://patienceai.in

services:
  - type: web
    name: patience-ai
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: PM2_HOME=/tmp/.pm2 ./node_modules/.bin/pm2-runtime start ecosystem.config.cjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://patienceai.in
      - key: PUBLIC_SITE_URL
        value: https://patienceai.in
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GODADDY_SMTP_HOST
        sync: false
      - key: GODADDY_SMTP_PORT
        sync: false
      - key: GODADDY_SMTP_SECURE
        sync: false
      - key: GODADDY_SMTP_USER
        sync: false
      - key: GODADDY_SMTP_PASS
        sync: false
      - key: GODADDY_SMTP_FROM
        sync: false
      - key: SUPPORT_APP_NAME
        value: PatienceAI Support
      - key: REDIS_URL
        sync: false

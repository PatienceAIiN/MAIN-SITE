services:
  - type: web
    name: patienceai-main
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://patienceai.in
      - key: PUBLIC_SITE_URL
        value: https://patienceai.in
      # Auth
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: MARKETING_USERNAME
        sync: false
      - key: MARKETING_PASSWORD
        sync: false
      - key: MARKETING_SESSION_SECRET
        sync: false
      # Database
      - key: DATABASE_URL
        sync: false
      # AI
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      # X / Twitter
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      # LinkedIn
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false
      - key: LINKEDIN_PAGE_ID
        sync: false
      # Instagram
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      # SMTP / Email
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SENDER_NAME
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      # Scheduler
      - key: POST_SCHEDULE_TIMES
        value: "09:00,13:00,18:00"
      - key: POST_PLATFORMS
        value: "twitter,linkedin,instagram"
      - key: POST_DAILY_LIMIT
        value: "3"
      - key: POST_TIMEZONE
        value: "Asia/Kolkata"
      # Support
      - key: SUPPORT_APP_NAME
        value: PatienceAI Support
      - key: REDIS_URL
        sync: false
    healthCheckPath: /
